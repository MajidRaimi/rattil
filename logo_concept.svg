<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f0" rx="8"/>

  <!-- K mark rotated 90deg -->
  <g transform="translate(100, 100) rotate(90) translate(-50, -55)" fill="#1a1a1a">
    <!-- Upper spine -->
    <polygon points="0,0 24,0 24,44 0,52"/>
    <!-- Upper arm (tilted ~2° inward) -->
    <g transform="rotate(-2, 70, 25)">
      <polygon points="30,30 100,0 100,22 42,50"/>
    </g>
    <!-- Lower arm (tilted ~2° inward) -->
    <g transform="rotate(2, 70, 95)">
      <polygon points="42,64 100,92 100,114 30,84"/>
    </g>
    <!-- Lower spine -->
    <polygon points="0,62 24,70 24,114 0,114"/>
  </g>
</svg>
