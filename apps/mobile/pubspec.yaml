name: quran_mobile
description: "Offline-first Quran reading app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  scrollable_positioned_list: ^0.3.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  quran: ^1.4.1
  imad_flutter:
    path: ../../mushaf-imad-flutter
  flutter_floating_bottom_bar: ^1.4.0
  flutter_screenutil: ^5.9.3
  flutter_locales: ^3.0.3
  flutter_localizations:
    sdk: flutter
  quran_flutter: ^1.0.3
  dio: ^5.9.2
  just_audio: ^0.10.5
  animated_theme_switcher: 2.0.10
  tab_container: ^3.5.3
  progress_border: ^0.1.5
  animated_flip_counter: ^0.3.4
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.5

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#f5f5f0"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#f5f5f0"
    theme_color: "#D4A843"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
  macos:
    generate: true
    image_path: "assets/app_icon.png"

flutter_native_splash:
  color: "#f5f5f0"
  color_dark: "#1a1a1a"
  image: assets/splash_logo.png
  android_12:
    color: "#f5f5f0"
    color_dark: "#1a1a1a"
    image: assets/splash_logo.png
  ios: true
  web: true

dependency_overrides:
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true

  assets:
    - assets/db/
    - assets/locales/
    - assets/app_icon.png

  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
    - family: NeueFrutigerWorld
      fonts:
        - asset: assets/fonts/NeueFrutigerWorld-Regular.ttf
          weight: 400
        - asset: assets/fonts/NeueFrutigerWorld-Medium.ttf
          weight: 500
        - asset: assets/fonts/NeueFrutigerWorld-Bold.ttf
          weight: 700
